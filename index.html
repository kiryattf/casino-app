<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Casino Mini App</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            text-align: center;
            font-family: sans-serif;
        }

        .btn {
            padding: 15px 30px;
            background: #ed4245;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <h1 id="game-title">Загрузка...</h1>
    <p>Ставка: <span id="bet-amount">0</span></p>
    <div id="timer" style="font-size: 48px; margin: 20px;"></div>
    <button id="cashout" class="btn" style="display:none;">ЗАБРАТЬ!</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Читаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const game = urlParams.get('game') || 'Не выбрана';
        const bet = urlParams.get('bet') || '0';

        document.getElementById('game-title').innerText = "Игра: " + game.toUpperCase();
        document.getElementById('bet-amount').innerText = bet;

        // Таймер 3 секунды
        let seconds = 3;
        const timerDiv = document.getElementById('timer');

        const countdown = setInterval(() => {
            timerDiv.innerText = seconds;
            seconds--;
            if (seconds < 0) {
                clearInterval(countdown);
                timerDiv.innerText = "ПОЕХАЛИ! 🚀";
                document.getElementById('cashout').style.display = 'inline-block';
            }
        }, 1000);
    </script>
</body>

</html>
